<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boring S*** Leak Calculator | Reeves Innovate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-4">

    <div id="calculator-card" class="max-w-md w-full p-8 bg-slate-900 text-white rounded-2xl shadow-2xl border border-blue-500/30">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                The "Boring S***" Leak Calculator
            </h1>
            <p class="text-slate-400 mt-2">Translate "annoyance" into Annual Loss.</p>
        </div>
        
        <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Number of Employees Impacted</label>
            <input type="number" id="employees" placeholder="e.g. 5" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Avg. Hourly Rate (£)</label>
            <input type="number" id="rate" placeholder="e.g. 35" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Hours Lost per Week (per person)</label>
            <input type="number" id="hours" placeholder="e.g. 6" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <button onclick="revealResult()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-500/20 transition-all">
            Calculate My Leak Score
        </button>

        <div id="results-area" class="hidden mt-8 pt-8 border-t border-slate-800 animate-fade-in">
            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 bg-slate-800/50 rounded-lg border border-slate-700">
                    <span class="text-sm text-slate-400 font-medium">Weekly Leak:</span>
                    <span id="weekly-result" class="text-xl font-bold text-emerald-400">£0.00</span>
                </div>
                
                <div class="p-6 bg-gradient-to-br from-orange-600/20 to-red-600/20 rounded-xl border border-orange-500/50 text-center">
                    <span class="block text-xs font-bold uppercase text-orange-400 mb-1 tracking-widest">Total Annual Leak</span>
                    <span id="annual-result" class="text-4xl font-black text-white">£0.00</span>
                </div>
            </div>

            <a href="https://reevesinnovate.com/book.html" class="block w-full mt-8 py-4 bg-white text-slate-900 text-center font-bold rounded-xl hover:bg-slate-200 transition-all">
                Book 15-Min Gap Analysis
            </a>
        </div>
    </div>

    <script>
    function revealResult() {
        const A = parseFloat(document.getElementById('employees').value) || 0;
        const B = parseFloat(document.getElementById('rate').value) || 0;
        const C = parseFloat(document.getElementById('hours').value) || 0;

        const weeklyLeak = A * B * C; // Formula D
        const annualLeak = weeklyLeak * 52; // Formula E

        document.getElementById('weekly-result').innerText = '£' + weeklyLeak.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('annual-result').innerText = '£' + annualLeak.toLocaleString(undefined, {minimumFractionDigits: 2});
        
        document.getElementById('results-area').classList.remove('hidden');
    }
    </script>
</body>
</html>
